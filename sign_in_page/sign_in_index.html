<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TasteForge - Sign In</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-modal">
    <div class="modal-header">
        <button class="back-btn-top" onclick="window.location.href='../index.html'" title="Go Back">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        </button>
        <div class="logo-container-center">
            <img src="TasteForge_Logo.png" alt="TasteForge Logo" class="logo-icon" style="width: 28px; height: 28px;">
            <span class="brand-name">TasteForge</span>
        </div>
    </div>

    <div class="welcome-text">
        <h2>Welcome Back!</h2>
        <p>Sign in to continue to TasteForge</p>
    </div>

    <div class="tab-container">
        <button class="tab-btn active" id="tab-user" onclick="switchTab('user')">User</button>
        <button class="tab-btn" id="tab-owner" onclick="switchTab('owner')">Owner</button>
    </div>


    <form id="loginForm" onsubmit="event.preventDefault();">
        <div class="input-group">
            <input type="email" placeholder="Email Address" required>
        </div>
        
        <div class="input-group password-group">
            <input type="password" id="passwordInput" placeholder="Password" required>
            <button type="button" class="toggle-password" onclick="togglePassword()">
                <svg id="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                </svg>
            </button>
        </div>

        <div class="form-options">
            <label class="remember-me">
                <input type="checkbox">
                <span class="checkmark"></span>
                Remember me
            </label>
            <a href="../forgot_password/Forgot_index.html" class="forgot-link">Forgot Password?</a>
        </div>

        <button type="submit" class="btn-primary">Login</button>
    </form>

    <div class="divider">
        <span>or</span>
    </div>

    <button class="btn-secondary" onclick="window.location.href='../menu_page/index.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        Continue as Guest
    </button>

    <div class="modal-footer">
        <p>Don't have an account? <a href="../sign_up_page/User_index.html" class="signup-link" id="signupLink">Sign Up</a></p>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
