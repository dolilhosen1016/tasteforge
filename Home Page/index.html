<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-container">
    </div>

    <div class="content-wrapper">
        <header class="navbar">

                <img src="TasteForge_Logo.png" alt="TasteForge Logo Icon" class="logo-icon">

            <nav class="nav-links">
