<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TasteForge - Craft Your Perfect Meal</title>
    <link rel="stylesheet" href="style.css?v=2.0">
</head>
<body>
    <div class="background-container">
    </div>

    <div class="content-wrapper">
        <header class="navbar">
            <div class="logo">
                <img src="TasteForge_Logo.png" alt="TasteForge Logo Icon" class="logo-icon">
                <span class="logo-text">TasteForge</span>
            </div>
            
            <nav class="nav-links">
                <a href="index.html" class="active">Home</a>
                <a href="Menu Page/index.html">Menu</a>
                <a href="#">How It Works</a>
                <a href="#">About</a>
            </nav>

            <div class="cart-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="9" cy="21" r="1"></circle>
                    <circle cx="20" cy="21" r="1"></circle>
                    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                </svg>
            </div>
        </header>

        <main class="hero-section">
            <h1 class="hero-title">
                Craft Your<br>
                Perfect <span class="highlight">Meal</span>
            </h1>
            <p class="hero-subtitle">
                Premium ingredients. Personalized by you.<br>
                Delivered with perfection.
            </p>
            
            <div class="cta-group">
                <a href="Menu Page/index.html" class="btn primary-btn" id="startBtn">Start Building (Guest)</a>
                <a href="Sign In Page/Signin_index.html" class="btn secondary-btn">Sign In / Sign Up</a>
                <a href="#" class="owner-link">Owner Portal &rarr;</a>
            </div>
        </main>

        <div class="stats-container">
            <div class="stat-item">
                <div class="stat-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#c5e842" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <path d="M16 10a4 4 0 0 1-8 0"></path>
                    </svg>
                </div>
                <div class="stat-text">
                    <h3>10K+</h3>
                    <p>Happy Customers</p>
                </div>
            </div>
            
            <div class="divider"></div>

            <div class="stat-item">
                <div class="stat-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#c5e842" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path>
                    </svg>
                </div>
                <div class="stat-text">
                    <h3>50+</h3>
                    <p>Ingredients</p>
                </div>
            </div>

            <div class="divider"></div>

            <div class="stat-item">
                <div class="stat-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#c5e842" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
                    </svg>
                </div>
                <div class="stat-text">
                    <h3>4.8 <span style="color: #c5e842; font-size: 14px;">★</span></h3>
                    <p>Average Rating</p>
                </div>
            </div>

            <div class="divider"></div>

            <div class="stat-item">
                <div class="stat-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#c5e842" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <polyline points="12 6 12 12 16 14"></polyline>
                    </svg>
                </div>
                <div class="stat-text">
                    <h3>30 Min</h3>
                    <p>Delivery</p>
                </div>
            </div>
        </div>
    </div> <script src="script.js"></script>
</body>
</html>
