<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TasteForge - Sign In</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-modal">
    <div class="modal-header">
        <a href="../Home Page/index.html" class="logo-container" style="text-decoration: none;">
            <img src="TasteForge_Logo.png" alt="TasteForge Logo" class="logo-icon" style="width: 28px; height: 28px; margin-right: 8px;">
            <span class="brand-name">TasteForge</span>
        </a>
        <button class="close-btn" onclick="window.location.href='../Home Page/index.html'">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
    </div>

    <div class="tab-container">
        <button class="tab-btn active" id="tab-user" onclick="switchTab('user')">User</button>
        <button class="tab-btn" id="tab-owner" onclick="switchTab('owner')">Owner</button>
    </div>

    <div class="welcome-text">
        <h2>Welcome Back!</h2>
        <p>Sign in to continue to TasteForge</p>
    </div>

    <form id="loginForm" onsubmit="event.preventDefault();">
        <div class="input-group">
            <input type="email" placeholder="Email Address" required>
        </div>
        
        <div class="input-group password-group">
            <input type="password" id="passwordInput" placeholder="Password" required>
            <button type="button" class="toggle-password" onclick="togglePassword()">
                <svg id="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                </svg>
            </button>
        </div>

        <div class="form-options">
            <label class="remember-me">
                <input type="checkbox">
                <span class="checkmark"></span>
                Remember me
            </label>
            <a href="../Forgot Password/Forgot_index.html" class="forgot-link">Forgot Password?</a>
        </div>

        <button type="submit" class="btn-primary">Login</button>
    </form>

    <div class="modal-footer">
        <p><a href="../Home Page/index.html" class="back-link" style="display: inline-flex; align-items: center; gap: 6px;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 16px; height: 16px;"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            Back to Home
        </a></p>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
