<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | TasteForge</title>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-container"></div>

    <header class="navbar">
        <div class="logo">
            <a href="../index.html" style="display: flex; align-items: center; gap: 10px; text-decoration: none;">
                <img src="../TasteForge_Logo.png" alt="TasteForge Logo Icon" class="logo-icon">
                <span class="logo-text">TasteForge</span>
            </a>
        </div>
        
        <nav class="nav-links">
            <a href="../index.html">Home</a>
            <a href="../Menu Page/index.html">Menu</a>
            <a href="../How It Works Page/index.html">How It Works</a>
            <a href="../About Page/index.html">About</a>
        </nav>

        <div class="nav-actions-right">
            <div class="menu-icon" id="menuBtn">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </div>
        </div>

        <div class="dropdown-menu" id="dropdownMenu">
            <a href="../Help Center Page/index.html" class="dropdown-item">Help & Legal</a>
            <a href="index.html" class="dropdown-item active">Contact Us</a>
        </div>
    </header>

    <main class="contact-container">
        <div class="contact-wrapper">
            
            <div class="contact-form-section">
                <h1>Get in Touch</h1>
                <p class="subtitle">We'd love to hear from you.</p>
                
                <form id="contactForm" class="form-wrapper">
                    <div class="input-group">
                        <input type="text" id="fullName" placeholder="Full Name" required>
                    </div>
                    <div class="input-group">
                        <input type="email" id="emailAddress" placeholder="Email Address" required>
                    </div>
                    <div class="input-group">
                        <textarea id="message" rows="5" placeholder="Message" required></textarea>
                    </div>
                    <button type="submit" class="submit-btn" id="submitBtn">Send Message</button>
                </form>
            </div>

            <div class="contact-info-section">
                <div class="glass-panel info-card">
                    <h2>Contact Information</h2>
                    
                    <div class="info-list">
                        <div class="info-item">
                            <div class="info-icon"><i class="fa-solid fa-phone-volume"></i></div>
                            <div class="info-text">
                                <span class="label">Phone</span>
                                <span class="detail">+880 1234-567890</span>
                            </div>
                        </div>
                        
                        <div class="info-item">
                            <div class="info-icon"><i class="fa-regular fa-envelope"></i></div>
                            <div class="info-text">
                                <span class="label">Email</span>
                                <span class="detail">hello@tasteforge.com</span>
                            </div>
                        </div>
                        
                        <div class="info-item">
                            <div class="info-icon"><i class="fa-solid fa-location-dot"></i></div>
                            <div class="info-text">
                                <span class="label">Location</span>
                                <span class="detail">Dhaka, Bangladesh</span>
                            </div>
                        </div>

                        <div class="info-item">
                            <div class="info-icon"><i class="fa-regular fa-clock"></i></div>
                            <div class="info-text">
                                <span class="label">Working Hours</span>
                                <span class="detail">Mon - Sun: 10:00 AM - 11:00 PM</span>
                            </div>
                        </div>
                    </div>

                    <div class="social-section">
                        <h3>Follow Us</h3>
                        <div class="social-links">
                            <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
                            <a href="#"><i class="fa-brands fa-instagram"></i></a>
                            <a href="#"><i class="fa-brands fa-twitter"></i></a>
                            <a href="#"><i class="fa-brands fa-youtube"></i></a>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="map-section glass-panel">
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d116834.00977782643!2d90.33728812683838!3d23.780840488924195!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3755b8b087026b81%3A0x8fa563bbdd5904c2!2sDhaka%2C%20Bangladesh!5e0!3m2!1sen!2sbd!4v1690000000000!5m2!1sen!2sbd" width="100%" height="350" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
        </div>

    </main>

    <script src="script.js"></script>
</body>
</html>
