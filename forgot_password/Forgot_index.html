<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TasteForge - Forgot Password</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-modal">
    <div class="modal-header">
        <a href="../index.html" class="logo-container" style="text-decoration: none;">
            <img src="TasteForge_Logo.png" alt="TasteForge Logo" class="logo-icon" style="width: 28px; height: 28px; margin-right: 8px;">
            <span class="brand-name">TasteForge</span>
        </a>
        <button class="close-btn" onclick="window.location.href='../sign_in_page/signin_index.html'">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
    </div>

    <div class="welcome-text">
        <div class="lock-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
        </div>
        <h2>Reset Password</h2>
        <p>Enter your email address and we'll send you a link to reset your password.</p>
    </div>

    <form id="forgotPasswordForm">
        <div class="input-group">
            <input type="email" id="resetEmail" placeholder="Enter your registered email" required>
        </div>

        <div id="successMessage" class="success-message" style="display: none;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
            <span>Reset link sent successfully!</span>
        </div>

        <button type="submit" class="btn-primary" id="submitBtn">Send Reset Link</button>
    </form>

    <div class="modal-footer">
        <p><a href="../sign_in_page/signin_index.html" class="back-link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            Back to Login
        </a></p>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
